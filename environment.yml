name: plantbert
channels:
  - defaults
  - conda-forge

dependencies:
  - python=3.10
  - pip

  - pip:
    # ── Deep learning core ──────────────────────────────────────────────────
    # Install torch separately first with the correct CUDA wheel, e.g.:
    #   pip install torch==2.5.1+cu121 --index-url https://download.pytorch.org/whl/cu121
    - torch>=2.2
    - transformers>=4.40
    - pytorch-lightning>=2.2
    - accelerate>=0.30
    - tokenizers>=0.19
    - safetensors>=0.4
    - huggingface_hub>=0.23

    # ── Config / CLI ────────────────────────────────────────────────────────
    - hydra-core>=1.3
    - omegaconf>=2.3

    # ── Data / IO ───────────────────────────────────────────────────────────
    - h5py>=3.10
    - numpy>=1.26
    - biopython>=1.83
    - pandas>=2.0

    # ── Experiment tracking ─────────────────────────────────────────────────
    - wandb>=0.17
    - tqdm>=4.66

    # ── Training utilities ──────────────────────────────────────────────────
    - torchmetrics>=1.0
    - scikit-learn>=1.3
    - scipy>=1.12

    # ── Dev / testing ───────────────────────────────────────────────────────
    - pytest>=8.0
    - pytest-cov>=5.0
    - ruff>=0.4
    - mypy>=1.10
    - ipykernel>=6.29
    - jupyter>=1.0
