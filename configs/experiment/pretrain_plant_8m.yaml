# @package _global_
# PlantBERT-8M pretraining on Viridiplantae TrEMBL data
# Comparable to: esm2_t6_8M_UR50D  (~8M params, 6 layers)
# Usage: python scripts/pretrain.py +experiment=pretrain_plant_8m

defaults:
  - override /data: trembl_full
  - override /model: plant_bert_8m
  - override /tokenizer: amino_acid
  - override /training: pretrain_8m

# batch_size=32 × accumulate_grad_batches=4 → effective batch = 128 sequences per update
# Safe for RTX 3060 12GB: attention VRAM ≈ 300MB vs ~10GB+ with batch_size=192
data:
  batch_size: 32
