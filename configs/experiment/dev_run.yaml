# @package _global_
# Quick sanity-check: trembl_full + bert_small — validates the full pipeline works fast
# Usage: python scripts/pretrain.py +experiment=dev_run

defaults:
  - override /data: trembl_full
  - override /model: bert_small
  - override /tokenizer: amino_acid

training:
  trainer:
    max_steps: 1000
    val_check_interval: 100
  checkpoint:
    save_top_k: 1

data:
  batch_size: 8
