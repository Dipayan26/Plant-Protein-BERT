# Root Hydra configuration — composes sub-configs from each group.
#
# How Hydra works:
#   This file lists "default" configs from each group (data/, model/, etc.).
#   Experiment configs (configs/experiment/*.yaml) override these defaults
#   for named runs.  Any value can also be overridden on the command line:
#     python scripts/pretrain.py training.optimizer.lr=1e-3
#
# Every run automatically saves a full config snapshot to:
#   outputs/YYYY-MM-DD/HH-MM-SS/.hydra/config.yaml
# This makes every experiment 100% reproducible.
# =============================================== updated this file where nothing is written 
defaults:
  - data: trembl_full
  - tokenizer: amino_acid ## here i update in the branch where it is written
  - model: bert_base     # default generic model; use +experiment= for ESM-2 matched sizes
  - training: pretrain
  - evaluation: default # now changing in main branch where it is written
  - _self_

hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}

seed: 42
project_name: plant-protein-bert
