defaults:
  - data: trembl_full
  - tokenizer: amino_acid
  - model: bert_base
  - training: pretrain
  - evaluation: default
  - _self_

hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}

seed: 42
project_name: plant-protein-bert
