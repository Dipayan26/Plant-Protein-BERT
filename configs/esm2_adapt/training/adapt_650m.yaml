# @package _global_.training
# Domain-adaptive continued pretraining — ESM-2 650M (LoRA)
#
# Token budget: 1.6B tokens
#   batch=4 × avg_seq≈305 AA × accum=16 = ~19.5K tokens/update  (measured from 8M run)
#   1.6B / 19.5K ≈ 82K steps  (≈ 0.4 passes over the 4B-token plant dataset)
#   Note: batch=8 OOMs on RTX 3060 12 GB even with LoRA + gradient checkpointing.
#         accum=16 restores the same effective batch size as the original batch=8/accum=8.
#
# LR: 2e-4  (LoRA adapters are randomly initialised, so they tolerate a higher LR
#   than full continued pretraining where the base weights are already trained.
#   Typical LoRA LR is 10–100× higher than full fine-tuning LR.)
_target_: plant_bert.adapt.trainer.ESM2Adapter

mlm_probability: 0.15

token_budget: 1_600_000_000   # 1.6B tokens

optimizer:
  _target_: torch.optim.AdamW
  lr: 2.0e-4
  betas: [0.9, 0.98]
  weight_decay: 0.01
  eps: 1.0e-8

scheduler:
  _target_: transformers.get_linear_schedule_with_warmup
  num_warmup_steps: 500
  num_training_steps: 87000   # ceiling

trainer:
  max_steps: 87000
  val_check_interval: 2000
  log_every_n_steps: 50
  gradient_clip_val: 1.0
  precision: 16-mixed
  accumulate_grad_batches: 16
  devices: 1
  strategy: auto

checkpoint:
  monitor: val/mlm_loss
  mode: min
  save_top_k: 2
  save_last: true
  dirpath: ${hydra:runtime.cwd}/checkpoints/esm2_adapt/650m
