# @package _global_.training
# Domain-adaptive continued pretraining — ESM-2 35M
#
# Token budget: 800M tokens
#   batch=32 × avg_seq≈250 AA × accum=2 = ~16K tokens/update
#   800M / 16K ≈ 50K steps  (≈ 0.2 passes over the 4B-token plant dataset)
#
# LR 20× lower than ESM-2 from-scratch (4e-4 → 2e-5)
_target_: plant_bert.adapt.trainer.ESM2Adapter

mlm_probability: 0.15

token_budget: 800_000_000   # 800M tokens

optimizer:
  _target_: torch.optim.AdamW
  lr: 2.0e-5
  betas: [0.9, 0.98]
  weight_decay: 0.01
  eps: 1.0e-8

scheduler:
  _target_: transformers.get_linear_schedule_with_warmup
  num_warmup_steps: 500
  num_training_steps: 55000

trainer:
  max_steps: 55000
  val_check_interval: 2000
  log_every_n_steps: 50
  gradient_clip_val: 1.0
  precision: 16-mixed
  accumulate_grad_batches: 2
  devices: 1
  strategy: auto

checkpoint:
  monitor: val/mlm_loss
  mode: min
  save_top_k: 2
  save_last: true
  dirpath: ${hydra:runtime.cwd}/checkpoints/esm2_adapt/35m
