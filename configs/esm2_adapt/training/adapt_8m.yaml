# @package _global_.training
# Domain-adaptive continued pretraining — ESM-2 8M
#
# Token budget: 800M tokens
#   batch=64 × avg_seq≈250 AA × accum=1 = ~16K tokens/update
#   800M / 16K ≈ 50K steps  (≈ 0.2 passes over the 4B-token plant dataset)
#
# LR is 20× lower than ESM-2 from-scratch (4e-4 → 2e-5).
# High LR in continued pretraining destroys existing representations in early steps.
_target_: plant_bert.adapt.trainer.ESM2Adapter

mlm_probability: 0.15

# Token budget — TokenBudgetCallback stops training when this is reached.
# max_steps acts as a ceiling; the callback fires first under normal conditions.
token_budget: 800_000_000   # 800M tokens

optimizer:
  _target_: torch.optim.AdamW
  lr: 2.0e-5
  betas: [0.9, 0.98]
  weight_decay: 0.01
  eps: 1.0e-8

scheduler:
  _target_: transformers.get_linear_schedule_with_warmup
  num_warmup_steps: 500        # short warmup — model already has good representations
  num_training_steps: 55000    # ceiling slightly above expected steps

trainer:
  max_steps: 55000
  val_check_interval: 2000
  log_every_n_steps: 50
  gradient_clip_val: 1.0
  precision: 16-mixed
  accumulate_grad_batches: 1
  devices: 1
  strategy: auto

checkpoint:
  monitor: val/mlm_loss
  mode: min
  save_top_k: 2
  save_last: true
  dirpath: ${hydra:runtime.cwd}/checkpoints/esm2_adapt/8m
