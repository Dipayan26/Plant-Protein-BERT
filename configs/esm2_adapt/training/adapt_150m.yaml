# @package _global_.training
# Domain-adaptive continued pretraining — ESM-2 150M
#
# Token budget: 3.5B tokens  (≈ 0.52 passes over the 6.76B-token plant corpus)
#   Effective batch = data.batch_size(8) × accum(8) = 64 sequences/update
#   Measured rate ≈ 9.9K tokens/update (from the real 35M run at eff. batch 64)
#   3.5B / 9.9K ≈ 354K steps   (3.0B ≈ 303K · 4.0B ≈ 404K if you retune the budget)
#
#   NOTE: the corpus is 6.76B tokens (19.9M seqs × ~339 AA), NOT the "4B" the
#   old comment claimed.  The token count is enforced by TokenBudgetCallback,
#   which counts ACTUAL tokens — so the budget below is the real stop criterion.
#
# Strategy: recalibrate ESM-2 representations toward plant-specific sequence
# statistics without catastrophic forgetting of general protein biochemistry.
# This is a token-budget SWEEP target, not a hard stop: checkpoint along the way
# and stop early if the downstream delta (localization / PPI) plateaus before 3.5B.
#
# LR schedule:
#   Peak: 1e-5  (40× lower than ESM-2 from-scratch 4e-4)
#   Warmup: 1000 steps → linear decay over the full max_steps horizon.
#   num_training_steps is deliberately set EQUAL to max_steps so the LR never
#   hits 0 before the token budget stops the run (setting it too low would waste
#   the tail of training at LR≈0).  LR at the ~354K stop ≈ 11% of peak — a clean
#   low-LR convergence tail.
_target_: plant_bert.adapt.trainer.ESM2Adapter

mlm_probability: 0.15

token_budget: 3_500_000_000   # 3.5B tokens — sweep target; stop & evaluate downstream

optimizer:
  _target_: torch.optim.AdamW
  lr: 1.0e-5
  betas: [0.9, 0.98]
  weight_decay: 0.01
  eps: 1.0e-8

scheduler:
  _target_: transformers.get_linear_schedule_with_warmup
  num_warmup_steps: 1000          # ~0.3% of horizon; model already has good reps
  num_training_steps: 400000      # = max_steps, so LR decays across the full horizon

trainer:
  max_steps: 400000               # SAFETY CEILING only — TokenBudgetCallback (3.5B) stops first
                                  #   sized for the conservative ~9.9K tok/step rate (3.5B→354K < 400K)
  val_check_interval: 10000       # ~35 validations over the run
  limit_val_batches: 500
  log_every_n_steps: 50
  gradient_clip_val: 1.0
  precision: 16-mixed
  accumulate_grad_batches: 8
  devices: 1
  strategy: auto

checkpoint:
  monitor: val/mlm_loss
  mode: min
  save_top_k: 2
  save_last: true
  dirpath: ${hydra:runtime.cwd}/checkpoints/esm2_adapt/150m
