# @package _global_.training
# Pretraining config for PlantBERT-35M
# Optimizer settings mirror ESM-2 (Lin et al. 2022, Section A.2.4 + Table S3)
#
# Compute budget for single GPU:
#   batch_size=16, accum=8 → eff_batch=128 seqs, ~65K tokens/step
#   150K steps ≈ ~2 passes through plant data
_target_: plant_bert.training.pretrain.MLMPretrainer

mlm_probability: 0.15
mask_token_prob: 0.80
random_token_prob: 0.10
keep_original_prob: 0.10

optimizer:
  _target_: torch.optim.AdamW
  lr: 4.0e-4                   # ESM-2 peak LR (Table S3)
  betas: [0.9, 0.98]           # ESM-2 uses β2=0.98
  weight_decay: 0.01
  eps: 1.0e-8

scheduler:
  _target_: transformers.get_linear_schedule_with_warmup
  num_warmup_steps: 2000
  num_training_steps: 150000

trainer:
  max_steps: 150000
  val_check_interval: 5000
  log_every_n_steps: 100
  gradient_clip_val: 0.0       # ESM-2 Table S3: clip_norm=0 for 35M
  precision: 16-mixed
  accumulate_grad_batches: 8   # larger accumulation to compensate smaller batch
  devices: 1
  strategy: auto

checkpoint:
  monitor: val/mlm_loss
  mode: min
  save_top_k: 3
  save_last: true
  dirpath: ${hydra:runtime.cwd}/checkpoints/pretrain
