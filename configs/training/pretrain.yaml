# @package _global_.training
_target_: plant_bert.training.pretrain.MLMPretrainer

mlm_probability: 0.15
mask_token_prob: 0.80
random_token_prob: 0.10
keep_original_prob: 0.10

optimizer:
  _target_: torch.optim.AdamW
  lr: 1.0e-4
  betas: [0.9, 0.999]
  weight_decay: 0.01
  eps: 1.0e-8

scheduler:
  _target_: transformers.get_linear_schedule_with_warmup
  num_warmup_steps: 10000
  num_training_steps: 1000000

trainer:
  max_steps: 1000000
  val_check_interval: 5000
  log_every_n_steps: 100
  gradient_clip_val: 1.0
  precision: 16-mixed
  accumulate_grad_batches: 4
  devices: 1
  strategy: auto

checkpoint:
  monitor: val/mlm_loss
  mode: min
  save_top_k: 3
  save_last: true
  dirpath: ${hydra:runtime.cwd}/checkpoints/pretrain
