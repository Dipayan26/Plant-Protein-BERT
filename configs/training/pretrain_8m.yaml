# @package _global_.training
# Pretraining config for PlantBERT-8M
# Optimizer settings mirror ESM-2 (Lin et al. 2022, Section A.2.4 + Table S3)
#   Adam β1=0.9, β2=0.98, ε=1e-8, LR=4e-4, WD=0.01, no clip_norm
#   Warmup 2000 steps → linear decay to 10% over 90% of training
#
# Compute budget for single RTX 3060 12GB GPU:
#   batch_size=32, accum=4 → eff_batch=128 seqs × ~200 avg AA ≈ 25K tokens/step
#   200K steps ≈ 200K × 128 / 19.9M ≈ ~1.3 passes through the dataset
#   VRAM: attention maps = 32 × 20 × 200 × 200 × 6 layers ≈ 300MB — safe for 12GB
_target_: plant_bert.training.pretrain.MLMPretrainer

mlm_probability: 0.15
mask_token_prob: 0.80          # 80% → [MASK]
random_token_prob: 0.10        # 10% → random token
keep_original_prob: 0.10       # 10% → unchanged

optimizer:
  _target_: torch.optim.AdamW
  lr: 4.0e-4                   # ESM-2 peak LR (Table S3)
  betas: [0.9, 0.98]           # ESM-2 uses β2=0.98, not 0.999
  weight_decay: 0.01
  eps: 1.0e-8

scheduler:
  _target_: transformers.get_linear_schedule_with_warmup
  num_warmup_steps: 2000       # ESM-2: warm up over first 2000 steps
  num_training_steps: 200000

trainer:
  max_steps: 200000
  val_check_interval: 5000
  log_every_n_steps: 100
  gradient_clip_val: 0.0       # ESM-2 Table S3: clip_norm=0 for 8M
  precision: 16-mixed
  accumulate_grad_batches: 4   # accumulate 4 mini-batches → effective batch = 4 × data.batch_size
  devices: 1
  strategy: auto

checkpoint:
  monitor: val/mlm_loss
  mode: min
  save_top_k: 3
  save_last: true
  dirpath: ${hydra:runtime.cwd}/checkpoints/pretrain
